<section class="grid w-full max-w-[32rem] gap-3">
  <div class="flex items-center justify-between gap-3">
    <label class="text-xs font-semibold text-[var(--tng-semantic-foreground-secondary)]" for="release-notes-textarea-tailwind">
      Release notes
    </label>
    <button
      type="button"
      class="rounded-full border border-[var(--tng-semantic-border-subtle)] bg-[var(--tng-semantic-background-base)] px-3 py-1 text-xs font-semibold text-[var(--tng-semantic-foreground-secondary)] transition hover:border-[var(--tng-semantic-border-strong)] hover:text-[var(--tng-semantic-foreground-primary)]"
    >
      Auto-save
    </button>
  </div>
  <div
    tngInputGroup
    class="min-h-[7.5rem] items-start rounded-xl border border-[var(--tng-semantic-border-strong)] bg-[var(--tng-semantic-background-base)] px-3 py-3 shadow-none transition
           [&[data-focused]]:border-[var(--tng-semantic-accent-brand)] [&[data-focused]]:ring-2 [&[data-focused]]:ring-blue-400/20"
  >
    <textarea
      id="release-notes-textarea-tailwind"
      tngTextarea
      rows="4"
      aria-label="Release notes"
      class="min-h-[6rem] w-full min-w-0 resize-y appearance-none border-0 bg-transparent p-0 text-[var(--tng-semantic-foreground-primary)] outline-none placeholder:text-[var(--tng-semantic-foreground-muted)] focus:outline-none focus:ring-0"
      [value]="releaseNotes()"
      (input)="onReleaseNotesInput($event)"
    ></textarea>
  </div>
</section>
<br/>
<br/>
<section class="grid w-full max-w-[32rem] gap-3">
  <div class="flex items-center justify-between gap-3">
    <label class="text-xs font-semibold tracking-[0.01em] text-slate-600 dark:text-slate-400" for="review-notes-demo-tailwind">
      Reviewer notes
    </label>
    <span
      aria-hidden="true"
      class="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-semibold tracking-[0.01em] text-slate-500 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-400"
    >
      Draft
    </span>
  </div>
  <div
    tngInputGroup
    class="min-h-[8rem] items-start rounded-xl border border-slate-300 bg-white px-3 py-3 shadow-sm transition dark:border-slate-600 dark:bg-slate-950 [&[data-focused]]:border-blue-500 [&[data-focused]]:ring-4 [&[data-focused]]:ring-blue-500/15"
  >
    <textarea
      id="review-notes-demo-tailwind"
      tngTextarea
      rows="5"
      placeholder="Add reviewer notes"
      aria-label="Reviewer notes"
      class="min-h-[6.5rem] w-full min-w-0 flex-1 resize-y appearance-none border-0 bg-transparent p-0 text-slate-900 outline-none placeholder:text-slate-400 dark:text-slate-50 dark:placeholder:text-slate-500 focus:outline-none focus:ring-0"
      [value]="reviewNotes()"
      (input)="onReviewNotesInput($event)"
    ></textarea>
  </div>
</section>
<br/>
<br/>
<section class="grid w-full max-w-[32rem] gap-3">
  <div class="flex items-center justify-between gap-3">
    <label class="text-xs font-semibold tracking-[0.01em] text-slate-600 dark:text-slate-400" for="support-reply-textarea-tailwind">
      Support reply
    </label>
    <span
      aria-hidden="true"
      class="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-semibold tracking-[0.01em] text-slate-500 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-400"
    >
      Markdown enabled
    </span>
  </div>
  <div
    tngInputGroup
    class="min-h-[8rem] items-start rounded-xl border border-slate-300 bg-white px-3 py-3 shadow-sm transition dark:border-slate-600 dark:bg-slate-950 [&[data-focused]]:border-blue-500 [&[data-focused]]:ring-4 [&[data-focused]]:ring-blue-500/15"
  >
    <textarea
      id="support-reply-textarea-tailwind"
      tngTextarea
      rows="5"
      aria-label="Support reply"
      class="min-h-[6.5rem] w-full min-w-0 flex-1 resize-y appearance-none border-0 bg-transparent p-0 text-slate-900 outline-none shadow-none dark:text-slate-50 focus:outline-none focus:ring-0 focus-visible:outline-none focus-visible:ring-0"
      [value]="supportReply()"
      (input)="onSupportReplyInput($event)"
    ></textarea>
  </div>
</section>
