<fieldset class="grid w-full max-w-[28rem] gap-3 rounded-xl border border-slate-300 bg-white p-4 shadow-sm">
  <legend class="text-sm font-semibold text-slate-900">Billing plan</legend>
  <label class="inline-flex items-center gap-3 text-sm font-medium text-slate-900">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'starter'"
      (change)="onPlanChange('starter', $event)"
      class="h-4 w-4 border-slate-300 text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40"
    />
    <span>Starter</span>
  </label>
  <label class="inline-flex items-center gap-3 text-sm font-medium text-slate-900">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'pro'"
      (change)="onPlanChange('pro', $event)"
      class="h-4 w-4 border-slate-300 text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40"
    />
    <span>Pro</span>
  </label>
  <label class="inline-flex items-center gap-3 text-sm font-medium text-slate-900">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'enterprise'"
      (change)="onPlanChange('enterprise', $event)"
      class="h-4 w-4 border-slate-300 text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40"
    />
    <span>Enterprise</span>
  </label>
  <p class="m-0 text-xs text-slate-600">Selected: {{ selectedPlan() }}</p>
</fieldset>
<fieldset class="grid w-full max-w-[26rem] gap-3 rounded-xl border border-slate-300 bg-white p-4 shadow-sm">
  <legend class="text-sm font-semibold text-slate-900">Release target</legend>
  <label class="inline-flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-900">
    <input
      type="radio"
      tngRadio
      name="release-target"
      [checked]="true"
      class="h-4 w-4 border-slate-300 text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40"
    />
    <span>Production release</span>
  </label>
  <label class="inline-flex items-center gap-3 rounded-lg border border-rose-300/80 bg-rose-50 px-3 py-2 text-sm font-medium text-slate-900">
    <input
      type="radio"
      tngRadio
      name="release-target"
      [invalid]="true"
      class="h-4 w-4 border-rose-400 text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500/30"
    />
    <span>Needs compliance approval</span>
  </label>
</fieldset>
