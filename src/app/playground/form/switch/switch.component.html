<section class="grid w-full max-w-[30rem] gap-4 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
  <div class="inline-flex items-center gap-4">
    <button
      tngSwitch
      class="inline-flex h-6 w-11 items-center rounded-full border-0 bg-slate-300 p-0.5 transition data-[state=checked]:bg-blue-600 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-blue-100"
      [checked]="autoPublish()"
      ariaLabel="Auto publish after review"
      (click)="onAutoPublishToggle()"
    >
      <span
        aria-hidden="true"
        class="block h-5 w-5 rounded-full bg-white shadow-sm transition-transform"
        [class.translate-x-5]="autoPublish()"
      ></span>
    </button>
    <div class="grid gap-0.5">
      <span class="text-sm font-semibold text-slate-900">Auto publish</span>
      <span class="text-xs text-slate-500">Ship after review approval.</span>
    </div>
  </div>
</section>
<br/>
<section class="grid w-full max-w-[32rem] gap-3 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
  <div class="inline-flex items-center justify-between gap-4">
    <span class="text-sm font-semibold text-slate-900">Emergency cutoff</span>
    <button
      tngSwitch
      class="inline-flex h-6 w-11 items-center rounded-full border-0 bg-slate-300 p-0.5 transition data-[state=checked]:bg-blue-600 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-blue-100"
      [checked]="true"
      [required]="true"
      ariaLabel="Emergency cutoff"
    >
      <span aria-hidden="true" class="block h-5 w-5 rounded-full bg-white shadow-sm transition-transform translate-x-5"></span>
    </button>
  </div>
  <div class="inline-flex items-center justify-between gap-4 text-slate-500">
    <span class="text-sm font-semibold">Production bypass</span>
    <button
      tngSwitch
      class="inline-flex h-6 w-11 items-center rounded-full border-0 bg-slate-300 p-0.5 opacity-55 transition data-[state=checked]:bg-blue-600"
      [checked]="false"
      [disabled]="true"
      ariaLabel="Production bypass"
    >
      <span aria-hidden="true" class="block h-5 w-5 rounded-full bg-white shadow-sm"></span>
    </button>
  </div>
</section>
