<section class="mx-auto grid w-full max-w-[24rem] gap-3 rounded-[1.5rem] border border-slate-200 bg-white p-4 text-slate-900 shadow-[0_18px_38px_rgba(15,23,42,0.12)]">
  <span class="text-[0.75rem] font-semibold uppercase tracking-[0.22em] text-slate-500">Actions menu</span>
  <p class="m-0 text-[0.875rem] leading-6 text-slate-500">
    A single trigger opens a panel; utilities style the trigger and absolutely positioned panel.
  </p>

  <div class="relative grid justify-items-start content-start">
    <div class="relative inline-block">
      <button
        type="button"
        [tngMenuTrigger]="overviewTailwindMenu"
        class="min-h-[2.05rem] rounded-[0.62rem] border border-slate-400 bg-slate-50 px-[0.9rem] py-[0.46rem] text-[0.95rem] font-semibold text-slate-900 shadow-[0_1px_2px_rgba(15,23,42,0.08)] transition hover:border-blue-400 hover:bg-blue-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300 aria-[expanded=true]:border-blue-500 aria-[expanded=true]:bg-blue-100 aria-[expanded=true]:text-blue-700 aria-[expanded=true]:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.25),0_1px_2px_rgba(15,23,42,0.08)]"
      >
        Open menu
      </button>
      <div
        tngMenu
        #overviewTailwindMenu="tngMenu"
        aria-label="Actions"
        class="absolute left-0 top-[calc(100%+0.45rem)] z-30 hidden min-w-[13.8rem] rounded-[0.82rem] border border-slate-400 bg-white p-[0.45rem] shadow-[0_16px_30px_-22px_rgba(15,23,42,0.35)] data-[state=open]:grid data-[state=open]:gap-[0.24rem]"
        (tngMenuSelect)="onOverviewTailwindCommandSelect($event)"
      >
        <div tngMenuGroupLabel class="px-[0.45rem] py-[0.25rem] text-[0.72rem] font-bold uppercase tracking-[0.08em] text-slate-500">Actions</div>
        <button type="button" tngMenuItem tngMenuItemValue="duplicate" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Duplicate</button>
        <button type="button" tngMenuItem tngMenuItemValue="rename" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Rename</button>
        <div tngMenuSeparator class="mx-[0.35rem] my-[0.2rem] h-px bg-slate-200"></div>
        <button type="button" tngMenuItem tngMenuItemValue="delete" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Delete</button>
      </div>
    </div>
  </div>

  <p class="m-0 text-[0.875rem] text-slate-500">Last command: <strong class="font-semibold text-slate-900">{{ overviewTailwindLastCommand() }}</strong></p>
</section>


<br/>
