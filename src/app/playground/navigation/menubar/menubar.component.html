<section class="mx-auto grid w-full max-w-[24rem] gap-3 rounded-[1.5rem] border border-slate-200/90 bg-[linear-gradient(180deg,#ffffff_0%,#f8fafc_100%)] p-4 text-slate-900 shadow-[0_18px_38px_rgba(15,23,42,0.10)]">
  <span class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-500">Workspace commands</span>
  <p class="m-0 text-sm leading-6 text-slate-600">Keep top-level actions visible while menus own the deeper command tree.</p>

  <div class="headless-menubar-overview-tailwind-stage">
    <div tngMenubar aria-label="Workspace commands" class="inline-flex min-h-[2.7rem] gap-[0.45rem] rounded-[0.95rem] border border-slate-300 bg-[linear-gradient(180deg,#ffffff_0%,#f8fafc_100%)] p-[0.32rem] shadow-[0_8px_22px_-18px_rgba(15,23,42,0.26),0_10px_32px_-24px_rgba(15,23,42,0.18)]">
      <div class="relative">
        <div tngMenu #overviewTailwindFileMenu="tngMenu" aria-label="File menu" class="absolute left-0 top-[calc(100%+0.45rem)] z-30 hidden min-w-[13.8rem] rounded-[0.82rem] border border-slate-300 bg-white p-[0.45rem] shadow-[0_16px_30px_-22px_rgba(15,23,42,0.35)] data-[state=open]:grid data-[state=open]:gap-[0.24rem]" (tngMenuSelect)="onOverviewTailwindCommandSelect($event)">
          <div tngMenuGroupLabel class="px-[0.45rem] py-[0.25rem] text-[0.72rem] font-bold uppercase tracking-[0.08em] text-slate-500">File</div>
          <button type="button" tngMenuItem tngMenuItemValue="Create document" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 hover:text-slate-950 focus:bg-blue-100 focus:text-blue-700 focus-visible:ring-2 focus-visible:ring-blue-400/40 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">New</button>
          <button type="button" tngMenuItem tngMenuItemValue="Open document" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 hover:text-slate-950 focus:bg-blue-100 focus:text-blue-700 focus-visible:ring-2 focus-visible:ring-blue-400/40 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Open</button>
          <button type="button" tngMenuItem tngMenuItemValue="Save document" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 hover:text-slate-950 focus:bg-blue-100 focus:text-blue-700 focus-visible:ring-2 focus-visible:ring-blue-400/40 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Save</button>
        </div>
        <button type="button" tngMenubarItem [tngMenubarMenu]="overviewTailwindFileMenu" class="headless-menubar-overview-tailwind-item min-h-[2.05rem] min-w-[3.3rem] rounded-[0.62rem] px-[0.9rem] py-[0.46rem] text-[0.95rem] font-semibold text-slate-900 outline-none transition hover:bg-blue-50 hover:text-blue-700 focus:bg-blue-100 focus:text-blue-700 focus:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.22)] focus-visible:ring-2 focus-visible:ring-blue-400/40 aria-[expanded=true]:bg-blue-100 aria-[expanded=true]:text-blue-700 aria-[expanded=true]:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.22)]">File</button>
      </div>

      <div class="relative">
        <div tngMenu #overviewTailwindToolsMenu="tngMenu" aria-label="Tools menu" class="absolute left-0 top-[calc(100%+0.45rem)] z-30 hidden min-w-[13.8rem] rounded-[0.82rem] border border-slate-300 bg-white p-[0.45rem] shadow-[0_16px_30px_-22px_rgba(15,23,42,0.35)] data-[state=open]:grid data-[state=open]:gap-[0.24rem]" (tngMenuSelect)="onOverviewTailwindCommandSelect($event)">
          <div tngMenuGroupLabel class="px-[0.45rem] py-[0.25rem] text-[0.72rem] font-bold uppercase tracking-[0.08em] text-slate-500">Tools</div>
          <button type="button" tngMenuItem tngMenuItemValue="Run lint" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 hover:text-slate-950 focus:bg-blue-100 focus:text-blue-700 focus-visible:ring-2 focus-visible:ring-blue-400/40 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Run lint</button>
          <button type="button" tngMenuItem tngMenuItemValue="Run tests" class="flex min-h-[2rem] justify-between rounded-[0.58rem] px-[0.62rem] py-[0.4rem] text-left text-[0.86rem] font-medium text-slate-900 outline-none transition hover:bg-slate-100 hover:text-slate-950 focus:bg-blue-100 focus:text-blue-700 focus-visible:ring-2 focus-visible:ring-blue-400/40 [&[data-active]]:bg-blue-100 [&[data-active]]:text-blue-700">Run tests</button>
        </div>
        <button type="button" tngMenubarItem [tngMenubarMenu]="overviewTailwindToolsMenu" class="headless-menubar-overview-tailwind-item min-h-[2.05rem] min-w-[3.3rem] rounded-[0.62rem] px-[0.9rem] py-[0.46rem] text-[0.95rem] font-semibold text-slate-900 outline-none transition hover:bg-blue-50 hover:text-blue-700 focus:bg-blue-100 focus:text-blue-700 focus:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.22)] focus-visible:ring-2 focus-visible:ring-blue-400/40 aria-[expanded=true]:bg-blue-100 aria-[expanded=true]:text-blue-700 aria-[expanded=true]:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.22)]">Tools</button>
      </div>

      <button type="button" tngMenubarItem (click)="onOverviewTailwindLeafCommandSelect('Help')" class="headless-menubar-overview-tailwind-item min-h-[2.05rem] min-w-[3.3rem] rounded-[0.62rem] px-[0.9rem] py-[0.46rem] text-[0.95rem] font-semibold text-slate-900 outline-none transition hover:bg-blue-50 hover:text-blue-700 focus:bg-blue-100 focus:text-blue-700 focus:shadow-[inset_0_0_0_1px_rgba(37,99,235,0.22)] focus-visible:ring-2 focus-visible:ring-blue-400/40">Help</button>
    </div>
  </div>

  <p class="m-0 text-sm text-slate-500">Last command: <strong>{{ overviewTailwindLastCommand() }}</strong></p>
</section>
